name: nano_live2d
description: "Headless Live2D Cubism renderer with a C ABI, exposed to Flutter via FFI."
version: 0.1.0
repository: https://github.com/yplam/nano-dash
publish_to: 'none'

environment:
  sdk: ^3.12.2
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  code_assets: ^1.2.1
  hooks: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
