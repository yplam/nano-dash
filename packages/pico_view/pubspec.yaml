name: pico_view
description: "Mirror a Flutter widget subtree to an external SPI LCD driven by ESP32-P4 firmware over USB, with capacitive touch fed back into the widget tree."
version: 0.2.0
repository: https://github.com/yplam/nano-dash

# The native `pico-view` engine is built from a separate (private) Rust repo and
# shipped here as prebuilt libraries under `native/`.

environment:
  sdk: ^3.12.2
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  code_assets: ^1.2.1
  hooks: ^2.0.2
  # Runtime for the generated control-plane messages in lib/src/gen/ (schemas
  # live in the private pico-view repo under proto/; regenerate with
  # `protoc --dart_out=lib/src/gen -I <pico-view>/proto pv_ffi.proto pv_wire.proto`).
  protobuf: ^6.0.0
  fixnum: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
