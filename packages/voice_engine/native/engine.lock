# Pins the prebuilt `voice-engine` release that hook/build.dart downloads.
#
# `repo` is the PUBLIC repo whose release page hosts the assets; the engine
# source itself lives in a separate private repo, whose CI uploads them here.
repo = yplam/nano-dash
tag = voice-engine-v0.3.0

# SHA-256 of each release asset, in `sha256sum` output format so the published
# SHA256SUMS can be pasted in verbatim. The hook fails closed: an asset with no
# digest here, or one whose bytes do not match, is never linked.
