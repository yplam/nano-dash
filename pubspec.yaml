name: nano_dash
description: "Nano dashboard on external LCD."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8

  shared_preferences: ^2.5.5
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  logger: ^2.7.0
  dio: ^5.9.2

  pico_view:
    path: packages/pico_view
  nano_live2d:
    path: packages/nano_live2d
  voice_engine:
    path: packages/voice_engine
  file_selector: ^1.0.3
  path_provider: ^2.1.5
  window_manager: ^0.5.1
  tray_manager: ^0.5.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.12
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/bg.png
    - assets/tray/
    - assets/icon/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito.ttf

# Generate desktop launcher icons from the master 1024x1024 icon.
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: assets/icon/app_icon.png
  windows:
    generate: true
    image_path: assets/icon/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icon/app_icon.png
  web:
    generate: true
    image_path: assets/icon/web_icon.png
    background_color: "#ffffff"
    theme_color: "#ffffff"

msix_config:
  display_name: NanoDash
  publisher_display_name: lokxy
  publisher: CN=DD135C2F-E60A-490E-98A8-B4C7B3FBBA32
  identity_name: lokxy.NanoDash
  msix_version: 1.0.0.0
  logo_path: assets\icon\app_icon.png
  execution_alias: nanodash
  store: true
  languages: en-us, zh-cn
  capabilities: internetClient, usb