name: nano_dash
description: "Nano dashboard on external SPI LCD."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8

  shared_preferences: ^2.5.5
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  logger: ^2.7.0
  dio: ^5.9.2

  pico_view:
    path: packages/pico_view
  window_manager: ^0.5.1
  tray_manager: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/bg.png
    - assets/tray/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito.ttf